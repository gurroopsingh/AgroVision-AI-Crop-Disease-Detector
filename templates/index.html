<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroVision - AI Crop Disease Detector</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>AgroVision - AI Crop Disease Detector</h1>
    <p class="subtitle">Smart AI-powered plant health assistant.</p>

    <section class="card upload-card">
      <form id="predict-form">
        <label for="image-input" class="label">Leaf image</label>
        <input id="image-input" name="file" type="file" accept="image/*" required />
        <p id="file-error" class="error hidden"></p>

        <div class="preview-wrap">
          <img id="preview" alt="Image preview" class="hidden" />
          <p id="preview-placeholder">Image preview will appear here.</p>
        </div>

        <button id="predict-btn" type="submit">Predict</button>
      </form>

      <div id="loading" class="loading hidden">
        <span class="spinner" aria-hidden="true"></span>
        <span>Analyzing image...</span>
      </div>

      <section id="result" class="result-card hidden">
        <h2>Prediction Report</h2>
        <div class="prediction-head">
          <div class="prediction-badge">
            <span class="badge-label">Prediction</span>
            <span id="predicted-class">-</span>
          </div>
          <div id="certainty-badge" class="certainty-badge">LOW</div>
        </div>

        <div class="confidence-wrap">
          <div class="confidence-head">
            <strong>Confidence</strong>
            <span id="confidence">-</span>
          </div>
          <div class="progress-track">
            <div id="confidence-bar" class="progress-bar" style="width: 0%"></div>
          </div>
        </div>

        <div class="info-grid">
          <article class="info-block">
            <h3><span class="info-icon">[i]</span> Disease Description</h3>
            <p id="description">-</p>
          </article>
          <article class="info-block">
            <h3><span class="info-icon">[+]</span> Treatment</h3>
            <p id="treatment">-</p>
          </article>
          <article class="info-block">
            <h3><span class="info-icon">[shield]</span> Prevention</h3>
            <p id="prevention">-</p>
          </article>
        </div>
      </section>

      <p id="api-error" class="error hidden"></p>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
